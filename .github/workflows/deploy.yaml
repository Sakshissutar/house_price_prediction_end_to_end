name: CI/CD for Dockerized streamlit App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dockerbuild:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build The Docker Image
      run: docker build . --file Dockerfile --tag workflow-test:$(date +%s)
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt


  build-and-publish:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/stapp:latest

    - name: Image digest
      run: echo ${{ steps.build-and-publish.outputs.digest }}

    deploy:
      needs: build-and-publish
      runs-on: ubuntu-latest
    steps:
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 13.51.150.222
        username: ec2-user
        key: ${{secrets.EC2_SSH_KEY}}

        script:
          echo "Pull latest image from DockerHub"
          docker pull ${{ secrets.DOCKER_USERNAME}}/stapp:latest

          echo "Stop old container"
          docker stop streamlit_app || true
          docker rm streamlit_app || true

          echo "Run new container"
          docker run -d -p 8501:8501 \
          --name streamlit_app \
          --restart always \
          ${{secrets.DOCKER_USERNAME}}/stapp:latest
